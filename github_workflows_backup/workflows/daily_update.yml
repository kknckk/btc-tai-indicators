name: Daily Data Ingestion

on:
  schedule:
    # Uruchom codziennie o 01:00 ET (05:00 UTC)
    - cron: '0 5 * * *'
  workflow_dispatch: # Możliwość ręcznego odpalenia z GUI GitHuba

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Wymagane przez Workload Identity Federation (WIF) do autoryzacji z Google Cloud

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd data_ingestion
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # WAŻNE: Tutaj należy wkleić poprawny `workload_identity_provider` i `service_account`.
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Run Data Fetchers
        env:
          GCP_PROJECT_ID: 'btc-ind'
        run: |
          cd data_ingestion
          python derive_metrics.py
          python blockchain_fetcher.py
          python mempool_fetcher.py
          python bgeometrics_fetcher.py
          python bq_active_supply.py

      - name: Upload new data to BigQuery
        env:
          GCP_PROJECT_ID: 'btc-ind'
        run: |
          cd data_ingestion
          python upload_csv_to_bq.py

